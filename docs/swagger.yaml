openapi: 3.0.3
info:
  title: Delivery Service API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: ok
  /api/v1/deliveries/:
    post:
      summary: Create delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryPayload'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Delivery'
    get:
      summary: List deliveries
      parameters:
        - in: query
          name: customer_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_transit, delivered, canceled]
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Delivery'
  /api/v1/deliveries/{id}:
    get:
      summary: Get delivery by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Found
    put:
      summary: Update delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryPayload'
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
  /api/v1/deliveries/total:
    get:
      summary: Calculate total delivery cost for date range
      parameters:
        - in: query
          name: date_from
          required: true
          schema:
            type: string
            example: 2025-01-01
        - in: query
          name: date_to
          required: true
          schema:
            type: string
            example: 2025-01-31
        - in: query
          name: customer_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_transit, delivered, canceled]
      responses:
        '200':
          description: Calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  date_from:
                    type: string
                  date_to:
                    type: string
                  total_cost:
                    type: integer
components:
  schemas:
    DeliveryPayload:
      type: object
      required: [order_number, customer_id, destination_address, status, cost, delivery_date]
      properties:
        order_number:
          type: string
          example: ORD-2025-001
        customer_id:
          type: string
          format: uuid
        destination_address:
          type: string
          example: Moscow, Tverskaya 1
        status:
          type: string
          enum: [pending, in_transit, delivered, canceled]
        cost:
          type: integer
          example: 900
        delivery_date:
          type: string
          example: 2025-07-11
        completed_at:
          type: string
          nullable: true
          example: 2025-07-12
    Delivery:
      allOf:
        - $ref: '#/components/schemas/DeliveryPayload'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            created_at:
              type: string
            updated_at:
              type: string
